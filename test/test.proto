package = k8s;

// not pvc
enum AccessMode {
    // read write once
    ReadWriteOnce = 0;
    ReadOnlyMany = 1;
    ReadWriteMany = 2;
    ReadWriteOncePod = 3;
}


// pvc
message VolumeClaimTemplate {
    string name = 1;
    repeated AccessMode access_modes = 2;
    string storage_class_name = 3;
    string storage = 4;
}