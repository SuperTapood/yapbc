message Container {
    # name
    string name = 1;
    # image
    string image = 2;
    # ports
    # and even more ports
    optional repeated int32 ports = 3;
}

message VolumeMount {
    string name = 1;
    string mount_path = 2;
}

message Pod {
    string name = 1;
    repeated Container containers = 2;
    repeated VolumeMount mounts = 3;
    string restart_policy default "Always" = 4;
}